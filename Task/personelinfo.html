<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Details Form</title>
  <link rel="stylesheet" href="./personelinfo.css">
</head>
<body>

<div class="container">

  
  <div class="sidebar">
    <div class="step active">
      <span>1</span>
      <p>STEP 1<br><b>YOUR INFO</b></p>
    </div>
    <div class="step">
      <span>2</span>
      <p>STEP 2<br><b>SELECT PLAN</b></p>
    </div>
    <div class="step">
      <span>3</span>
      <p>STEP 3<br><b>ADD-ONS</b></p>
    </div>
    <div class="step">
      <span>4</span>
      <p>STEP 4<br><b>SUMMARY</b></p>
    </div>
  </div>

  
  <div class="form-section">
    <h2>Personal info</h2>
    <p>Please provide your name, email address, and phone number.</p>

    <label>Name</label>
    <input type="text" placeholder="e.g. Stephen King">

    <label>Email Address</label>
    <input type="email" placeholder="e.g. stephenking@lorem.com">

    <label>Phone Number</label>
    <input type="text" placeholder="e.g. +1 234 567 890">

    <button>Next Step</button>
  </div>

</div>

</body>
</html>
